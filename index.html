<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>Validación de Recibo</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#fff;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}body{display:flex;justify-content:center;align-items:flex-start}img{width:100%;height:100%;object-fit:contain;object-position:top center;pointer-events:none;-webkit-user-drag:none}</style></head><body oncontextmenu="return false"><img src="validacion.jpg" draggable="false" alt="Validación"><script>document.addEventListener("contextmenu",e=>e.preventDefault());document.addEventListener("dragstart",e=>e.preventDefault());document.addEventListener("selectstart",e=>e.preventDefault());document.addEventListener("keydown",function(e){if(e.key==="F12"||(e.ctrlKey&&e.shiftKey&&["I","J","C"].includes(e.key.toUpperCase()))||(e.ctrlKey&&e.key.toUpperCase()=="U"))e.preventDefault();});</script></body></html>
